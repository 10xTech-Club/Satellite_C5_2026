; ================================================================
; PlatformIO Project Configuration File
; Satellite Command Center v2.0
; ESP32 Satellite Communication Simulation System
;
; UPLOAD MODES
;   USB  → select env:satellite         (wired, first flash)
;   OTA  → select env:satellite_ota     (wireless, subsequent flashes)
;          connect PC to SATCOM-ALPHA WiFi before uploading via OTA
; ================================================================

; ────────────────────────────────────────────────────────────────
; SATELLITE — Main Hub (ESP32, AP: 192.168.4.1)
; ────────────────────────────────────────────────────────────────
[env:satellite]
platform                  = espressif32
board                     = esp32dev
framework                 = arduino
monitor_speed             = 115200
board_build.filesystem    = littlefs
build_src_filter          = +<main.cpp>
lib_deps =
    esp32async/ESPAsyncWebServer @ ^3.9.3
    ArduinoJson
    adafruit/Adafruit NeoPixel    @ ^1.12.0
    adafruit/DHT sensor library   @ ^1.4.4
    adafruit/Adafruit MPU6050     @ ^2.2.4
    adafruit/Adafruit Unified Sensor @ ^1.1.9
    madhephaestus/ESP32Servo      @ ^3.0.5
build_flags =
    -D SATELLITE_MODE=1
    -D CORE_DEBUG_LEVEL=1

[env:satellite_ota]
extends                   = env:satellite
upload_protocol           = espota
upload_port               = 192.168.4.1
upload_flags              = --auth=satellite2025
